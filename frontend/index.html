<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chewing &amp; Music Study</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4" crossorigin="anonymous"></script>
</head>
<body>
  <main id="app"></main>

  <template id="view-consent">
    <section class="view">
      <h1>Chewing &amp; Music Study</h1>
      <h2>Purpose</h2>
      <p>We are studying how different background music affects chewing speed during eating. Your participation will help us understand the relationship between auditory rhythm and eating behavior.</p>
      <h2>Privacy</h2>
      <ul>
        <li>Your camera will be turned on, but <strong>video frames stay in your browser and are never uploaded</strong>.</li>
        <li>If you choose to upload at the end, we only collect: food type, music type, chew counts and timestamps, per-bite data, and device info (browser, screen size).</li>
        <li>We do <strong>not</strong> collect: your face, name, email, IP address, or location.</li>
        <li>Uploading is voluntary — you only send data if you tap "Upload" on the results page.</li>
        <li>You can quit any time by closing this page.</li>
      </ul>
      <label class="consent-row">
        <input type="checkbox" id="consent-check">
        I have read and agree to participate.
      </label>
      <button id="consent-continue" disabled>Continue</button>
    </section>
  </template>

  <template id="view-setup">
    <section class="view">
      <h1>Before you start</h1>
      <h2>What are you eating?</h2>
      <div class="choices" id="food-choices">
        <label><input type="radio" name="food" value="chinese"> Chinese (rice/dishes)</label>
        <label><input type="radio" name="food" value="steak"> Steak</label>
        <label><input type="radio" name="food" value="salad"> Salad / light meal</label>
        <label><input type="radio" name="food" value="sushi"> Sushi</label>
        <label><input type="radio" name="food" value="western"> Western (pizza/burger/pasta/bread)</label>
      </div>
      <h2>Music type</h2>
      <div class="choices" id="music-choices">
        <label><input type="radio" name="music" value="classical"> Classical (calm)</label>
        <label><input type="radio" name="music" value="hiphop"> Hip-hop (rhythmic)</label>
      </div>
      <button id="setup-start" disabled>Start recording</button>
    </section>
  </template>

  <template id="view-recording">
    <section class="view recording">
      <video id="cam" autoplay muted playsinline></video>
      <div class="timer" id="timer">00:00</div>
      <div class="now-playing"><span class="label">Now playing:</span> <span id="track-title">—</span></div>
      <div class="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Detecting…</span>
      </div>
      <button id="recording-stop" class="stop">End recording</button>
    </section>
  </template>

  <template id="view-results">
    <section class="view">
      <h1>Your session</h1>
      <div class="cards" id="result-cards"></div>
      <h2>Chewing frequency over time</h2>
      <canvas id="freq-chart"></canvas>
      <h2>Chews per bite</h2>
      <canvas id="bites-chart"></canvas>
      <div class="actions">
        <button id="upload-btn">Upload anonymous result</button>
        <button id="again-btn">Start another session</button>
      </div>
      <p id="upload-status"></p>
    </section>
  </template>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
